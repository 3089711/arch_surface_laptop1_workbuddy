# Surface Laptop 1代 Arch Linux - GitHub Actions 自动构建脚本
# 基于 linux-surface 项目: https://github.com/linux-surface/linux-surface

name: Build Surface Laptop 1 Arch Linux Live Image

# 设置 workflow 级别的环境变量
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: '内核版本 (留空使用最新)'
        required: false
        type: string
        default: ''
      include_chrome:
        description: '包含 Chrome 浏览器'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install archiso and dependencies
        run: |
          # 更新系统
          pacman -Syu --noconfirm --needed

          # 安装 archiso 和构建依赖
          pacman -S --noconfirm --needed \
            archiso \
            git \
            base-devel \
            sudo \
            dosfstools \
            squashfs-tools \
            libarchive-tools \
            syslinux \
            grub \
            edk2-shell

      - name: Setup build environment
        run: |
          # 使用 archiso 提供的模板
          cp -r /usr/share/archiso/configs/releng/ ${{ github.workspace }}/surface-profile

          cd ${{ github.workspace }}/surface-profile

          # 创建必要的目录
          mkdir -p airootfs/root
          mkdir -p airootfs/etc/systemd/system/getty@tty1.service.d
          mkdir -p airootfs/etc/skel/.config/sway
          mkdir -p airootfs/etc/environment.d
          mkdir -p airootfs/etc/pacman.d


      - name: Create pacman.conf with linux-surface repo
        run: |
          cd ${{ github.workspace }}/surface-profile

          # 使用官方默认源 + linux-surface 仓库
          python3 -c "open('pacman.conf','w').write('[options]\nHoldPkg = pacman glibc\nArchitecture = auto\nColor\nCheckSpace\nParallelDownloads = 5\nSigLevel = Required DatabaseOptional\n\n[core]\nInclude = /etc/pacman.d/mirrorlist\n\n[extra]\nInclude = /etc/pacman.d/mirrorlist\n\n[multilib]\nInclude = /etc/pacman.d/mirrorlist\n\n[linux-surface]\nServer = https://pkg.surfacelinux.com/arch/\nSigLevel = Required\n')"

          # 复制到 airootfs
          cp pacman.conf airootfs/etc/pacman.conf

      - name: Import linux-surface GPG key
        run: |
          # 初始化 pacman 密钥环
          pacman-key --init
          
          # 导入 linux-surface GPG 密钥
          curl -s https://raw.githubusercontent.com/linux-surface/linux-surface/master/pkg/keys/surface.asc | \
            pacman-key --add -
          pacman-key --lsign-key 56C464BAAC421453

      - name: Create packages.x86_64
        run: |
          cd ${{ github.workspace }}/surface-profile

          # 基础系统包列表（包含 Google Chrome 和 Logseq）
          python3 -c "import base64; open('packages.x86_64','wb').write(base64.b64decode(''))"

      - name: Configure root user
        run: |
          cd ${{ github.workspace }}/surface-profile

          # 创建自动登录配置
          mkdir -p airootfs/etc/systemd/system/getty@tty1.service.d
          python3 -c "import base64; open('airootfs/etc/systemd/system/getty@tty1.service.d/autologin.conf','wb').write(base64.b64decode('W1NlcnZpY2VdCkV4ZWNTdGFydD0KRXhlY1N0YXJ0PS0vc2Jpbi9hZ2V0dHkgLS1hdXRvbG9naW4gcm9vdCAtLW5vY2xlYXIgJUkgJFRFUk0='))"

          # 创建 root 的 .bash_profile
          python3 -c "import base64; open('airootfs/root/.bash_profile','wb').write(base64.b64decode(''))"

          chmod +x airootfs/root/.bash_profile

      - name: Create setup script
        run: |
          cd ${{ github.workspace }}/surface-profile

          python3 -c "import base64; open('airootfs/usr/local/bin/setup-surface','wb').write(base64.b64decode(''))"

          chmod +x airootfs/usr/local/bin/setup-surface

      - name: Create Sway configuration
        run: |
          cd ${{ github.workspace }}/surface-profile

          mkdir -p airootfs/etc/skel/.config/sway

          python3 -c "import base64; open('airootfs/etc/skel/.config/sway/config','wb').write(base64.b64decode(''))"

      - name: Create profiledef.sh
        run: |
          cd ${{ github.workspace }}/surface-profile

          python3 -c "import base64; open('profiledef.sh','wb').write(base64.b64decode(''))"

          chmod +x profiledef.sh

      - name: Build ISO with mkarchiso
        run: |
          cd ${{ github.workspace }}/surface-profile

          echo "开始构建 ISO..."
          echo "这需要 15-30 分钟,请耐心等待..."
          echo ""

          # 使用 archiso 官方工具构建 (在 container 中不需要 sudo)
          mkarchiso -v -w work -o out .

          echo ""
          echo "构建完成!"

      - name: Generate checksums
        run: |
          cd ${{ github.workspace }}/surface-profile/out

          # 生成 SHA256 校验和
          sha256sum *.iso > SHA256SUMS

          # 显示文件信息
          ls -lh

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: surface-laptop1-arch-live-iso
          path: ${{ github.workspace }}/surface-profile/out/*.iso
          retention-days: 90

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: surface-laptop1-arch-checksums
          path: ${{ github.workspace }}/surface-profile/out/SHA256SUMS
          retention-days: 90

      - name: Create release info
        run: |
          cd ${{ github.workspace }}/surface-profile/out

          # 创建发布说明
          python3 -c "import base64,datetime; before=base64.b64decode('IyBTdXJmYWNlIExhcHRvcCAx5LujIEFyY2ggTGludXggTGl2ZSBVU0IgLSDlj5HluIPkv6Hmga8KCiMjIOaehOW7uuaXtumXtAo=').decode(); after=base64.b64decode('').decode(); ts=datetime.datetime.now().strftime('%Y-%m-%d %H:%M:%S'); open('RELEASE_NOTES.md','w').write(before+ts+after)"

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: ${{ github.workspace }}/surface-profile/out/RELEASE_NOTES.md
          retention-days: 90
